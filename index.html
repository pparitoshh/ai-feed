<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AI Feed">
  <title>AI Feed</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1c1c28;
      --text: #e2e8f0;
      --muted: #4a5568;
      --accent: #6366f1;
      --accent2: #8b5cf6;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    /* ── HEADER ── */
    .header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      padding: 14px 18px 8px;
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(to bottom, var(--bg) 70%, transparent);
    }

    .logo {
      font-size: 17px; font-weight: 800; letter-spacing: -0.6px;
    }
    .logo em { font-style: normal; color: var(--accent); }

    .hud {
      display: flex; align-items: center; gap: 10px;
    }

    .streak-chip {
      display: flex; align-items: center; gap: 4px;
      background: rgba(251,146,60,.12); border: 1px solid rgba(251,146,60,.25);
      border-radius: 20px; padding: 4px 10px;
      font-size: 12px; font-weight: 700; color: #fb923c;
    }

    .level-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .level-label { font-size: 10px; color: var(--muted); font-weight: 600; }
    .xp-track {
      width: 52px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden;
    }
    .xp-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width .5s ease; }

    /* ── TABS ── */
    .tabs {
      position: fixed; top: 52px; left: 0; right: 0; z-index: 190;
      display: flex; gap: 4px; padding: 0 18px 6px;
      background: linear-gradient(to bottom, var(--bg) 60%, transparent);
    }
    .tab {
      background: none; border: 1px solid transparent; color: var(--muted);
      font-size: 11px; font-weight: 700; padding: 4px 11px; border-radius: 20px;
      cursor: pointer; letter-spacing: .4px; text-transform: uppercase; transition: all .15s;
    }
    .tab.active { background: var(--border); border-color: var(--border); color: var(--text); }

    /* ── FEED ── */
    .feed {
      height: 100dvh; height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .feed::-webkit-scrollbar { display: none; }

    /* ── CARD ── */
    .card {
      height: 100dvh; height: 100vh;
      scroll-snap-align: start;
      position: relative;
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 90px 20px 96px;
      cursor: pointer;
    }

    .card-glow {
      position: absolute; inset: 0; z-index: 0;
      background: var(--surface);
    }
    .card-glow::before {
      content: '';
      position: absolute;
      top: -80px; right: -80px;
      width: 260px; height: 260px;
      border-radius: 50%;
      filter: blur(70px);
      opacity: .07;
    }
    .card-glow::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(10,10,15,.97) 0%, rgba(10,10,15,.5) 55%, transparent 100%);
    }

    .card-inner { position: relative; z-index: 1; }

    .card-source-row {
      display: flex; align-items: center; gap: 7px; margin-bottom: 10px;
    }
    .src-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .src-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); }
    .read-badge { margin-left: auto; font-size: 10px; color: var(--muted); }

    .card-tags { display: flex; gap: 5px; margin-bottom: 12px; flex-wrap: wrap; }
    .tag {
      font-size: 10px; font-weight: 700; padding: 3px 8px;
      border-radius: 4px; letter-spacing: .4px;
    }

    .card-title {
      font-size: clamp(19px, 5.5vw, 27px);
      font-weight: 800; line-height: 1.18; letter-spacing: -.4px;
      margin-bottom: 10px;
    }

    .card-desc {
      font-size: 13.5px; line-height: 1.65; color: #718096;
      margin-bottom: 18px;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }

    .card-footer { display: flex; align-items: center; justify-content: space-between; }

    .card-meta { font-size: 11.5px; color: var(--muted); }

    .card-actions { display: flex; gap: 8px; }

    .btn-save {
      background: var(--border); border: none; border-radius: 8px;
      width: 36px; height: 36px; font-size: 15px;
      cursor: pointer; transition: background .15s;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-save.saved { background: rgba(251,146,60,.18); }

    .btn-read {
      background: var(--accent); border: none; border-radius: 8px;
      color: #fff; font-size: 13px; font-weight: 700;
      padding: 0 16px; height: 36px;
      cursor: pointer; transition: opacity .15s; letter-spacing: .2px;
    }
    .btn-read:active { opacity: .8; }

    /* ── PROGRESS ── */
    .progress-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
      padding: 0 18px 18px;
      background: linear-gradient(to top, var(--bg) 55%, transparent);
    }
    .prog-stats {
      display: flex; justify-content: center; gap: 14px;
      font-size: 10.5px; color: var(--muted); margin-bottom: 7px;
    }
    .prog-stat { display: flex; align-items: center; gap: 3px; }
    .prog-track { height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
    .prog-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 1px; transition: width .3s ease; }
    .prog-label { font-size: 10px; color: var(--muted); text-align: center; margin-top: 5px; }

    /* ── SKELETON ── */
    .skeleton-card {
      height: 100dvh; height: 100vh;
      scroll-snap-align: start;
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 90px 20px 96px; background: var(--surface);
    }
    .skel { background: var(--border); border-radius: 6px; margin-bottom: 10px; animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: .5; } 50% { opacity: 1; } }

    /* ── EMPTY STATE ── */
    .empty {
      height: 100dvh; height: 100vh;
      scroll-snap-align: start;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; color: var(--muted); font-size: 14px; text-align: center; padding: 40px;
    }
    .empty-icon { font-size: 40px; margin-bottom: 4px; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 68px; left: 50%; transform: translateX(-50%) translateY(10px);
      background: #1e1e2e; border: 1px solid var(--border); border-radius: 10px;
      padding: 8px 16px; font-size: 13px; font-weight: 500;
      opacity: 0; transition: all .2s ease; z-index: 300; white-space: nowrap;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── KEYBOARD HINT ── */
    .kbd-hint {
      position: fixed; bottom: 56px; right: 16px; z-index: 150;
      font-size: 10px; color: var(--muted);
      display: none;
    }
    @media (hover: hover) { .kbd-hint { display: block; } }
    .kbd { background: var(--border); border-radius: 3px; padding: 1px 4px; font-family: monospace; }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">AI<em>Feed</em></div>
  <div class="hud">
    <div class="streak-chip" id="streak">🔥 0</div>
    <div class="level-wrap">
      <div class="level-label" id="levelLabel">LVL 0</div>
      <div class="xp-track"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
    </div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" data-tab="all" onclick="switchTab('all')">All</button>
  <button class="tab" data-tab="github" onclick="switchTab('github')">⭐ GitHub</button>
  <button class="tab" data-tab="chip" onclick="switchTab('chip')">Chip Huyen</button>
  <button class="tab" data-tab="saved" onclick="switchTab('saved')">🔖 Saved</button>
</div>

<!-- FEED -->
<div class="feed" id="feed">
  <!-- skeletons -->
  <div class="skeleton-card">
    <div class="skel" style="width:60px;height:12px;margin-bottom:14px"></div>
    <div class="skel" style="width:90%;height:28px"></div>
    <div class="skel" style="width:70%;height:28px"></div>
    <div class="skel" style="width:100%;height:14px;margin-top:14px"></div>
    <div class="skel" style="width:80%;height:14px"></div>
  </div>
  <div class="skeleton-card">
    <div class="skel" style="width:50px;height:12px;margin-bottom:14px"></div>
    <div class="skel" style="width:85%;height:28px"></div>
    <div class="skel" style="width:65%;height:28px"></div>
    <div class="skel" style="width:100%;height:14px;margin-top:14px"></div>
  </div>
</div>

<!-- PROGRESS -->
<div class="progress-bar">
  <div class="prog-stats" id="progStats"></div>
  <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  <div class="prog-label" id="progLabel">Loading…</div>
</div>

<!-- KEYBOARD HINT -->
<div class="kbd-hint">
  <kbd class="kbd">↑↓</kbd> scroll &nbsp; <kbd class="kbd">b</kbd> save &nbsp; <kbd class="kbd">↵</kbd> open
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
// SOURCES
// ══════════════════════════════════════════
const PROXY = 'https://api.rss2json.com/v1/api.json?rss_url=';

const SOURCES = [
  { id: 'tdab',    name: 'To Data & Beyond',  author: 'Youssef Hosni', url: 'https://todatabeyond.substack.com/feed',        color: '#6366f1', n: 7 },
  { id: 'decml',   name: 'Decoding ML',        author: 'Paul Iusztin',  url: 'https://decodingml.substack.com/feed',          color: '#0ea5e9', n: 7 },
  { id: 'llmw',    name: 'LLM Watch',          author: 'Pascal Biese',  url: 'https://xaiguy.substack.com/feed',              color: '#10b981', n: 5 },
  { id: 'decai',   name: 'Decoding AI Mag',    author: '',              url: 'https://decodingaimagazine.substack.com/feed',  color: '#f59e0b', n: 5 },
  { id: 'chip',    name: 'Chip Huyen',         author: 'Chip Huyen',    url: 'https://huyenchip.com/feed.xml',                color: '#e11d48', n: 6, isChip: true },
];

const TAG_MAP = [
  [/\brag\b/i,              'RAG',          '#0ea5e9'],
  [/agent|agentic/i,        'Agents',       '#6366f1'],
  [/\bllm\b|large.language/i,'LLM',         '#8b5cf6'],
  [/fine.?tun/i,            'Fine-tuning',  '#f59e0b'],
  [/inference/i,            'Inference',    '#10b981'],
  [/eval|benchmark/i,       'Eval',         '#ef4444'],
  [/mlops|deploy|prod/i,    'MLOps',        '#06b6d4'],
  [/transform|attention/i,  'Transformer',  '#a855f7'],
  [/graph/i,                'Graph',        '#14b8a6'],
  [/interview|career/i,     'Career',       '#f97316'],
  [/open.source|github/i,   'OSS',          '#22c55e'],
  [/distrib|parallel/i,     'Distributed',  '#84cc16'],
];

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let allCards = [];
let visibleCards = [];
let currentIdx = 0;
let activeTab = 'all';
let S = (() => { try { return JSON.parse(localStorage.getItem('aifeed') || '{}'); } catch { return {}; } })();
const save = () => localStorage.setItem('aifeed', JSON.stringify(S));

// ══════════════════════════════════════════
// GAMIFICATION
// ══════════════════════════════════════════
function initGamif() {
  const today = new Date().toDateString();
  const yest  = new Date(Date.now() - 864e5).toDateString();
  if (!S.lastVisit) { S.streak = 1; S.lastVisit = today; S.todayRead = 0; }
  else if (S.lastVisit !== today) {
    S.streak = S.lastVisit === yest ? (S.streak || 0) + 1 : 1;
    S.lastVisit = today;
    S.todayRead = 0;
  }
  if (!S.xp)    S.xp = 0;
  if (!S.saved) S.saved = [];
  if (!S.read)  S.read  = {};
  save();
  refreshHUD();
}

function markRead(card) {
  if (!card || S.read[card.id]) return;
  S.read[card.id] = 1;
  S.todayRead = (S.todayRead || 0) + 1;
  S.xp += 10;
  save();
  refreshHUD();
  if (S.todayRead === 5)  toast('🔥 5 posts today — on fire!');
  if (S.todayRead === 10) toast('🚀 10 posts — you\'re unstoppable');
}

function refreshHUD() {
  document.getElementById('streak').textContent    = '🔥 ' + (S.streak || 0);
  document.getElementById('levelLabel').textContent = 'LVL ' + Math.floor(S.xp / 100);
  document.getElementById('xpFill').style.width    = (S.xp % 100) + '%';
  document.getElementById('progStats').innerHTML   =
    `<span class="prog-stat">📖 ${S.todayRead||0} today</span>` +
    `<span class="prog-stat">⭐ Lvl ${Math.floor(S.xp/100)}</span>` +
    `<span class="prog-stat">🔖 ${S.saved.length} saved</span>`;
}

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
function getTags(text) {
  const out = [];
  for (const [re, label, color] of TAG_MAP) {
    if (re.test(text)) { out.push({ label, color }); if (out.length >= 3) break; }
  }
  return out;
}

function cleanHtml(h) {
  return (h || '').replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim().slice(0, 220);
}

function fmtDate(s) {
  return new Date(s).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: '2-digit' });
}

function readMin(text) {
  return Math.max(1, Math.round((text || '').replace(/<[^>]+>/g,'').split(/\s+/).length / 200));
}

function uid(s) { return btoa(encodeURIComponent(s)).slice(0, 20); }

// ══════════════════════════════════════════
// FETCH
// ══════════════════════════════════════════
async function fetchRSS(src) {
  try {
    const r = await fetch(`${PROXY}${encodeURIComponent(src.url)}&count=${src.n}`);
    const d = await r.json();
    if (d.status !== 'ok') return [];
    return (d.items || []).map(item => ({
      id:      uid(item.link),
      type:    src.isChip ? 'chip' : 'post',
      title:   item.title || '(No title)',
      desc:    cleanHtml(item.description || item.content || ''),
      link:    item.link,
      date:    item.pubDate,
      source:  src.name,
      author:  src.author || item.author || src.name,
      color:   src.color,
      tags:    getTags(item.title + ' ' + (item.categories || []).join(' ')),
      min:     readMin(item.content || item.description || ''),
    }));
  } catch { return []; }
}

async function fetchGitHub() {
  try {
    const since = new Date(Date.now() - 45 * 864e5).toISOString().slice(0, 10);
    const url = `https://api.github.com/search/repositories?q=generative-ai+llm+created:>${since}&sort=stars&order=desc&per_page=10`;
    const r = await fetch(url, { headers: { Accept: 'application/vnd.github.v3+json' } });
    const d = await r.json();
    return (d.items || []).map(repo => ({
      id:     uid(repo.html_url),
      type:   'github',
      title:  repo.full_name,
      desc:   repo.description || 'No description provided.',
      link:   repo.html_url,
      date:   repo.created_at,
      source: 'GitHub Trending',
      author: repo.owner.login,
      color:  '#22c55e',
      tags:   [
        { label: '⭐ ' + repo.stargazers_count.toLocaleString(), color: '#f59e0b' },
        ...(repo.language ? [{ label: repo.language, color: '#64748b' }] : []),
      ],
      min: null,
    }));
  } catch { return []; }
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function cardHTML(card, idx) {
  const saved = S.saved.includes(card.id);
  const read  = !!S.read[card.id];
  const tags  = card.tags.map(t =>
    `<span class="tag" style="background:${t.color}1a;color:${t.color};border:1px solid ${t.color}33">${t.label}</span>`
  ).join('');
  const meta = card.type === 'github'
    ? fmtDate(card.date)
    : `${fmtDate(card.date)} · ${card.min} min`;

  return `
<div class="card" data-idx="${idx}" data-id="${card.id}" data-link="${card.link}" onclick="cardClick(event,${idx})">
  <div class="card-glow" style="--glow-color:${card.color}">
    <style>.card[data-idx="${idx}"] .card-glow::before{background:${card.color}}</style>
  </div>
  <div class="card-inner">
    <div class="card-source-row">
      <div class="src-dot" style="background:${card.color}"></div>
      <span class="src-name">${card.source}</span>
      ${read ? '<span class="read-badge">✓ read</span>' : ''}
    </div>
    <div class="card-tags">${tags}</div>
    <div class="card-title">${card.title}</div>
    <div class="card-desc">${card.desc}</div>
    <div class="card-footer">
      <div class="card-meta">${meta}</div>
      <div class="card-actions">
        <button class="btn-save ${saved?'saved':''}" onclick="toggleSave(event,${idx})" title="Save">${saved?'🔖':'🔖'}</button>
        <button class="btn-read" onclick="openCard(event,'${card.link}')">Read →</button>
      </div>
    </div>
  </div>
</div>`;
}

function renderFeed(cards) {
  const feed = document.getElementById('feed');
  if (!cards.length) {
    feed.innerHTML = `<div class="empty"><div class="empty-icon">🤷</div>Nothing here yet.<br><small>Try a different tab.</small></div>`;
    updateProg(0, 0);
    return;
  }
  feed.innerHTML = cards.map((c, i) => cardHTML(c, i)).join('');
  feed.scrollTop = 0;
  currentIdx = 0;
  updateProg(0, cards.length);

  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.intersectionRatio > 0.55) {
        const i = +e.target.dataset.idx;
        currentIdx = i;
        updateProg(i, cards.length);
        markRead(cards[i]);
      }
    });
  }, { threshold: 0.55 });

  feed.querySelectorAll('.card').forEach(c => obs.observe(c));
}

function updateProg(idx, total) {
  const pct = total > 1 ? (idx / (total - 1)) * 100 : (total === 1 ? 100 : 0);
  document.getElementById('progFill').style.width  = pct + '%';
  document.getElementById('progLabel').textContent = total ? `${idx + 1} / ${total}` : '';
}

// ══════════════════════════════════════════
// TABS
// ══════════════════════════════════════════
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  if (tab === 'all')    visibleCards = allCards;
  else if (tab === 'github') visibleCards = allCards.filter(c => c.type === 'github');
  else if (tab === 'chip')   visibleCards = allCards.filter(c => c.type === 'chip');
  else if (tab === 'saved')  visibleCards = allCards.filter(c => S.saved.includes(c.id));
  renderFeed(visibleCards);
}

// ══════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════
function cardClick(e, idx) { /* handled by inner buttons */ }

function openCard(e, link) {
  e.stopPropagation();
  window.open(link, '_blank');
}

function toggleSave(e, idx) {
  e.stopPropagation();
  const card = visibleCards[idx];
  if (!card) return;
  const i = S.saved.indexOf(card.id);
  if (i === -1) { S.saved.push(card.id); toast('🔖 Saved!'); }
  else          { S.saved.splice(i, 1);  toast('Removed from saved'); }
  save();
  refreshHUD();
  // re-render just that card
  const el = document.querySelector(`.card[data-idx="${idx}"]`);
  if (el) el.outerHTML = cardHTML(card, idx);
  // re-attach observer (simple: just update button)
}

function toast(msg, dur = 2000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

// ══════════════════════════════════════════
// KEYBOARD
// ══════════════════════════════════════════
document.addEventListener('keydown', e => {
  const feed = document.getElementById('feed');
  const cards = feed.querySelectorAll('.card');
  if (!cards.length) return;
  if (e.key === 'ArrowDown' || e.key === 'j') {
    const n = Math.min(currentIdx + 1, cards.length - 1);
    cards[n].scrollIntoView({ behavior: 'smooth' });
  } else if (e.key === 'ArrowUp' || e.key === 'k') {
    const n = Math.max(currentIdx - 1, 0);
    cards[n].scrollIntoView({ behavior: 'smooth' });
  } else if (e.key === 'Enter') {
    const c = visibleCards[currentIdx];
    if (c) window.open(c.link, '_blank');
  } else if (e.key === 'b' || e.key === 's') {
    toggleSave({ stopPropagation: () => {} }, currentIdx);
  }
});

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
async function init() {
  initGamif();

  const [rssResults, ghCards] = await Promise.all([
    Promise.all(SOURCES.map(fetchRSS)),
    fetchGitHub(),
  ]);

  const postCards = rssResults.flat();

  // interleave: every 4 posts → 1 GitHub card
  allCards = [];
  let gi = 0;
  postCards.forEach((c, i) => {
    allCards.push(c);
    if ((i + 1) % 4 === 0 && gi < ghCards.length) allCards.push(ghCards[gi++]);
  });
  while (gi < ghCards.length) allCards.push(ghCards[gi++]);

  visibleCards = allCards;
  renderFeed(visibleCards);
  refreshHUD();
}

init();
</script>
</body>
</html>
